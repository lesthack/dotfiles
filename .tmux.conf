# Mouse
set -g mouse
# Asegurar que tmux reporta 256 colores
set -g default-terminal "screen-256color"
# Forzar el soporte True Color (Tc) para gnome-terminal (xterm)
set-option -sa terminal-overrides ",xterm-256color:Tc"

# Cambiamos C-b por C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Cambiamos algunos shortcuts
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

